<main class="container">
  <h1>Motor de Decisiones Vivo</h1>
  <section class="leccion-card">
    <h2>{{ leccionActual?.titulo }}</h2>
    <p class="metafora">{{ leccionActual?.metafora }}</p>
    <div class="codigo-box">
      <pre><code>{{leccionActual?.id}}</code></pre>
    </div>
    <div class="codigo-box">
      <pre><code>{{leccionActual?.opciones}}</code></pre>
    </div>
    <div class="opciones-contenedor">
      @for (opcion of leccionActual?.opciones; track opcion.id) {
        <button (click)="evaluarOpcion(opcion.id)" class="btn-opcion">
          {{ opcion.textoOpcion }}
        </button>
      }
    </div>
  </section>
</main>
<router-outlet></router-outlet>
